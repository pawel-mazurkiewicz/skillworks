<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f4f5f1" />
    <title>Skillworks</title>
    <link rel="icon" type="image/png" sizes="256x256" href="/icon_256.png" />
    <link rel="apple-touch-icon" href="/icon_256.png" />
  </head>
  <body>
    <div id="root"></div>
    <template id="appShellTemplate">
    <svg class="ui-sprite" aria-hidden="true">
      <defs>
        <symbol id="icon-search" viewBox="0 0 24 24">
          <path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
          <path d="M21 21l-6 -6" />
        </symbol>
        <symbol id="icon-tool" viewBox="0 0 24 24">
          <path d="M7 10h3v-3l-3.5 -3.5a6 6 0 0 1 8 8l6 6a2 2 0 0 1 -3 3l-6 -6a6 6 0 0 1 -8 -8l3.5 3.5" />
        </symbol>
        <symbol id="icon-file-upload" viewBox="0 0 24 24">
          <path d="M14 3v4a1 1 0 0 0 1 1h4" />
          <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2" />
          <path d="M12 11v6" />
          <path d="M9.5 13.5l2.5 -2.5l2.5 2.5" />
        </symbol>
        <symbol id="icon-stack" viewBox="0 0 24 24">
          <path d="M14 12l6 -3l-8 -4l-8 4l6 3" />
          <path d="M10 12l-6 3l8 4l8 -4l-6 -3l-2 1l-2 -1" fill="currentColor" stroke="none" />
        </symbol>
        <symbol id="icon-folder-cog" viewBox="0 0 24 24">
          <path d="M12.5 19h-7.5a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2h4l3 3h7a2 2 0 0 1 2 2v3" />
          <path d="M17.001 19a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
          <path d="M19.001 15.5v1.5" />
          <path d="M19.001 21v1.5" />
          <path d="M22.032 17.25l-1.299 .75" />
          <path d="M17.27 20l-1.3 .75" />
          <path d="M15.97 17.25l1.3 .75" />
          <path d="M20.733 20l1.3 .75" />
        </symbol>
        <symbol id="icon-clear-all" viewBox="0 0 24 24">
          <path d="M8 6h12" />
          <path d="M6 12h12" />
          <path d="M4 18h12" />
        </symbol>
        <symbol id="icon-folder" viewBox="0 0 24 24">
          <path d="M5 4h4l3 3h7a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2" />
        </symbol>
        <symbol id="icon-filter" viewBox="0 0 24 24">
          <path d="M4 4h16l-6 8v6l-4 2v-8z" />
        </symbol>
        <symbol id="icon-chevron-left" viewBox="0 0 24 24">
          <path d="M15 6l-6 6 6 6" />
        </symbol>
        <symbol id="icon-chevron-right" viewBox="0 0 24 24">
          <path d="M9 6l6 6-6 6" />
        </symbol>
        <symbol id="icon-x" viewBox="0 0 24 24">
          <path d="M6 6l12 12" />
          <path d="M18 6l-12 12" />
        </symbol>
      </defs>
    </svg>
    <div class="app-shell">
      <!-- Header rendered by React (PR2) -->

      <main class="workspace">
        <section class="tab-content" id="manageTab" data-top-tab-panel="manage" aria-label="Manage skills">
          <div class="manage-grid" data-sidebar-collapsed="true">
            <aside class="skill-sidebar" data-skill-sidebar aria-label="Skill filters">
              <button type="button" class="sidebar-toggle" data-action="sidebar-toggle" aria-expanded="false" aria-controls="sidebarBody" title="Filters & targets">
                <svg class="icon sidebar-toggle-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-filter"></use></svg>
                <span class="sidebar-toggle-label">Filters</span>
                <svg class="icon sidebar-toggle-caret" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chevron-right"></use></svg>
              </button>
              <div class="sidebar-body" id="sidebarBody">
                <div class="sidebar-section">
                  <h3 class="sidebar-heading">Filters</h3>
                  <div class="filter-stack">
                    <label class="inline-field">
                      <span>Agent</span>
                      <select id="agentFilterSelect"></select>
                    </label>
                    <label class="inline-field">
                      <span>Status</span>
                      <select id="statusFilterSelect">
                        <option value="all">Any status</option>
                        <option value="enabled">Enabled anywhere</option>
                        <option value="disabled">Disabled everywhere</option>
                      </select>
                    </label>
                    <label class="inline-field">
                      <span>Type</span>
                      <select id="typeFilterSelect"></select>
                    </label>
                    <label class="inline-field">
                      <span>Sort</span>
                      <select id="sortSelect">
                        <option value="name-asc">Name A-Z</option>
                        <option value="name-desc">Name Z-A</option>
                        <option value="author-asc">Author A-Z</option>
                        <option value="author-desc">Author Z-A</option>
                      </select>
                    </label>
                  </div>
                </div>
                <div class="sidebar-section">
                  <h3 class="sidebar-heading">Targets</h3>
                  <p class="sidebar-hint">Click a target to filter the list to skills enabled there.</p>
                  <div class="target-strip" id="targetStrip"></div>
                </div>
              </div>
            </aside>
            <section class="main-surface">
              <dl class="stats-strip" aria-label="Workspace summary">
                <div>
                  <dt>Vault skills</dt>
                  <dd><strong id="skillCount">0</strong></dd>
                </div>
                <div>
                  <dt>Links</dt>
                  <dd><strong id="enabledCount">0</strong></dd>
                </div>
                <div>
                  <dt>Unmanaged</dt>
                  <dd><strong id="unmanagedCount">0</strong></dd>
                </div>
              </dl>

              <div class="drift-pill" data-drift hidden></div>

              <div class="skill-list-shell">
                <div class="skill-list-head" id="matrixHead"></div>
                <div class="skill-list" id="matrixBody"></div>
              </div>
            </section>
            <aside class="detail-pane" aria-label="Skill details">
              <section class="panel empty-detail" id="emptyDetail">
                <h2>Select a skill</h2>
                <p>Assignment switches and documentation open here.</p>
              </section>
              <section class="panel detail-card" id="skillDetail" hidden>
                <div class="skill-detail-host" id="skillPreview"></div>
              </section>
            </aside>
          </div>
        </section>

        <section class="tab-content hidden" id="installTab" data-top-tab-panel="install" aria-label="Install skills">
          <div class="tab-grid install-stack">
            <section class="panel">
              <div class="section-head">
                <h2 class="section-title"><svg class="icon section-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-folder"></use></svg><span>From local folder</span></h2>
                <p class="section-sub">Move skills from another location into the vault.</p>
              </div>
              <div class="field-stack">
                <label>
                  <span>Source preset</span>
                  <select id="importSelect"></select>
                </label>
                <label>
                  <span>Source path</span>
                  <input id="importInput" placeholder="~/path/to/skills" autocomplete="off" spellcheck="false" />
                </label>
                <div class="button-row">
                  <button class="button" id="browseImportButton" type="button">Browse</button>
                  <button class="button" id="importButton" type="button">Move to vault</button>
                  <button class="button primary" id="importSuggestedButton" type="button">Move suggested</button>
                </div>
              </div>
            </section>

            <section class="panel">
              <div class="section-head">
                <h2 class="section-title"><svg class="icon section-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-file-upload"></use></svg><span>From Git</span></h2>
                <p class="section-sub">Clone a repo and install the skills it ships.</p>
              </div>
              <form class="field-stack" id="gitInstallForm">
                <label>
                  <span>Repository</span>
                  <input id="gitRepoInput" placeholder="https://github.com/org/repo.git" autocomplete="off" spellcheck="false" />
                </label>
                <label>
                  <span>Branch or tag</span>
                  <input id="gitRefInput" placeholder="optional, defaults to main" autocomplete="off" spellcheck="false" />
                </label>
                <details class="target-picker" id="gitTargetPicker">
                  <summary>
                    <span>
                      <strong>Install targets</strong>
                      <small id="gitTargetSummary">Vault only</small>
                    </span>
                  </summary>
                  <fieldset class="target-checkboxes" id="gitTargetCheckboxes">
                    <legend>Extra targets</legend>
                  </fieldset>
                </details>
                <div class="button-row">
                  <button class="button" id="gitPreviewButton" type="button">Preview</button>
                  <button class="button primary" type="submit">Clone and install</button>
                </div>
              </form>
              <div class="install-preview" id="gitPreviewResult" hidden></div>
            </section>

            <section class="panel span-2">
              <div class="section-head">
                <h2 class="section-title"><svg class="icon section-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-search"></use></svg><span>Discovery</span></h2>
                <p class="section-sub">Skills detected on this machine that aren't in the vault yet.</p>
              </div>
              <div class="discovery-summary" id="discoverySummary"></div>
              <div class="discovery-list" id="discoveryList"></div>
            </section>
          </div>
        </section>

        <section class="tab-content hidden" id="setsTab" data-top-tab-panel="sets" aria-label="Skill sets">
          <section class="panel">
            <div class="section-head">
              <h2 class="section-title"><svg class="icon section-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-stack"></use></svg><span>Sets</span></h2>
              <p class="section-sub">Curated bundles of skills and targets you can apply on demand.</p>
            </div>
            <div class="sets-layout">
              <aside class="sets-list">
                <header class="sets-list-header">
                  <div class="sets-filter" role="tablist">
                    <button type="button" class="chip is-active" data-sets-filter="all">All</button>
                    <button type="button" class="chip" data-sets-filter="global">Global</button>
                    <button type="button" class="chip" data-sets-filter="project">Project</button>
                  </div>
                  <div class="sets-actions">
                    <button type="button" class="button" data-action="set-new">New set</button>
                    <button type="button" class="button" data-action="set-snapshot">Snapshot current…</button>
                  </div>
                </header>
                <ul class="sets-rows" data-sets-rows></ul>
              </aside>
              <article class="sets-editor" data-sets-editor>
                <p class="muted">Select a set on the left, or create a new one.</p>
              </article>
            </div>
          </section>
        </section>

        <section class="tab-content hidden" id="configureTab" data-top-tab-panel="configure" aria-label="Configure workspace">
          <div class="tab-grid configure-stack">
            <section class="panel">
              <div class="section-head">
                <h2 class="section-title"><svg class="icon section-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-stack"></use></svg><span>Vault</span></h2>
                <p class="section-sub">Where Skillworks reads and writes skills. Save to update the workspace.</p>
              </div>
              <div class="field-stack">
                <label>
                  <span>Vault path</span>
                  <input id="vaultInput" autocomplete="off" spellcheck="false" placeholder="~/.claude/skills" />
                </label>
                <div class="button-row">
                  <button class="button" id="browseVaultButton" type="button">Browse</button>
                  <button class="button primary" id="saveVaultButton" type="button">Save</button>
                </div>
              </div>
            </section>

            <section class="panel">
              <div class="section-head">
                <h2 class="section-title"><svg class="icon section-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-folder"></use></svg><span>Projects</span></h2>
                <p class="section-sub">Projects this vault links into.</p>
              </div>
              <div class="field-stack">
                <label>
                  <span>Add project path</span>
                  <input id="projectAddInput" placeholder="/path/to/project" autocomplete="off" spellcheck="false" />
                </label>
                <div class="button-row">
                  <button class="button" id="browseProjectAddButton" type="button">Browse</button>
                  <button class="button" id="addProjectButton" type="button">Add</button>
                </div>
                <label>
                  <span>Scan folder</span>
                  <input id="projectScanRootInput" placeholder="~/code or another workspace folder" autocomplete="off" spellcheck="false" />
                </label>
                <div class="button-row">
                  <button class="button" id="browseProjectScanRootButton" type="button">Browse</button>
                  <button class="button primary" id="scanProjectsButton" type="button">Scan folder</button>
                  <button class="button" id="scanDefaultProjectsButton" type="button">Scan workspaces</button>
                  <button class="button danger" id="clearScannedProjectsButton" type="button">Clear scanned</button>
                </div>
              </div>
              <div class="project-list" id="projectList"></div>
            </section>

            <section class="panel">
              <div class="section-head">
                <h2 class="section-title"><svg class="icon section-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-folder-cog"></use></svg><span>Custom targets</span></h2>
                <p class="section-sub">Extra destinations beyond the default Claude paths.</p>
              </div>
              <form class="field-stack" id="customTargetForm">
                <label>
                  <span>Identifier</span>
                  <input id="customTargetId" placeholder="e.g. cursor-global" autocomplete="off" spellcheck="false" />
                </label>
                <label>
                  <span>Label</span>
                  <input id="customTargetLabel" placeholder="e.g. Cursor global" autocomplete="off" />
                </label>
                <label>
                  <span>Harness</span>
                  <input id="customTargetHarness" placeholder="optional, default: Custom" autocomplete="off" />
                </label>
                <label>
                  <span>Scope</span>
                  <select id="customTargetScope">
                    <option value="global">Global (absolute path)</option>
                    <option value="project">Project (relative path)</option>
                  </select>
                </label>
                <label>
                  <span>Path</span>
                  <input id="customTargetPath" placeholder="/abs/path or .relative/path" autocomplete="off" spellcheck="false" />
                </label>
                <button class="button primary" type="submit">Add custom target</button>
              </form>
              <div class="custom-target-list" id="customTargetList"></div>
            </section>

            <section class="panel">
              <div class="section-head">
                <h2 class="section-title"><svg class="icon section-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-clear-all"></use></svg><span>Unmanaged folders</span></h2>
                <p class="section-sub">Skill folders Claude can see but the vault doesn't track.</p>
              </div>
              <div class="unmanaged-list" id="unmanagedList"></div>
            </section>

          </div>
        </section>

        <section class="tab-content hidden" id="cleanupTab" data-top-tab-panel="cleanup" aria-label="Vault cleanup">
          <section class="panel cleanup-panel">
            <div class="section-head cleanup-head">
              <div>
                <h2 class="section-title"><svg class="icon section-icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-clear-all"></use></svg><span>Duplicate skills</span></h2>
                <p class="section-sub">Groups of skills with byte-identical SKILL.md content. Pick one to keep per group; the rest are deleted and any enabled links repoint to the keeper.</p>
              </div>
              <div class="button-row no-wrap">
                <button class="button" id="dedupeScanButton" type="button">Scan vault</button>
                <button class="button primary" id="dedupeApplyButton" type="button" disabled>Apply suggestions</button>
              </div>
            </div>
            <div class="dedupe-summary" id="dedupeSummary"></div>
            <div class="dedupe-list" id="dedupeList">
              <p class="empty-copy">Press <strong>Scan vault</strong> to find duplicate skills.</p>
            </div>
          </section>
        </section>
      </main>

      <aside class="bulk-floating" id="bulkFloating" data-bulk-floating hidden aria-label="Bulk actions">
        <header class="bulk-floating-head">
          <div class="bulk-count">
            <strong id="bulkSelectedCount">0 selected</strong>
          </div>
          <button class="button ghost" id="clearSelectionButton" type="button" aria-label="Clear selection">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-x"></use></svg>
            <span>Clear</span>
          </button>
        </header>
        <div class="bulk-floating-body">
          <div class="bulk-controls">
            <label class="inline-field">
              <span>Target</span>
              <select id="bulkTargetSelect" aria-label="Bulk action target"></select>
            </label>
            <div class="bulk-button-row">
              <button class="button" id="bulkEnableButton" type="button">Enable</button>
              <button class="button" id="bulkDisableButton" type="button">Disable</button>
              <button class="button" id="bulkToggleButton" type="button">Toggle</button>
            </div>
          </div>
          <div class="bulk-controls">
            <label class="inline-field grow">
              <span>Destination</span>
              <input id="bulkDestinationInput" placeholder="/path/to/folder" autocomplete="off" spellcheck="false" />
            </label>
            <div class="bulk-button-row">
              <button class="button" id="browseBulkDestinationButton" type="button">Browse</button>
              <button class="button" id="bulkCopyButton" type="button">Copy</button>
              <button class="button" id="bulkMoveButton" type="button">Move</button>
              <button class="button danger" id="bulkDeleteButton" type="button">Delete</button>
            </div>
          </div>
        </div>
      </aside>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <dialog class="modal" data-modal="apply-set" aria-labelledby="apply-set-title">
      <header class="modal-header">
        <h2 id="apply-set-title" data-apply-title>Apply set</h2>
        <button type="button" class="modal-close" data-action="apply-cancel" aria-label="Close">&times;</button>
      </header>
      <div class="modal-body" data-apply-body>
        <p class="muted">Computing plan&hellip;</p>
      </div>
      <footer class="modal-footer">
        <button type="button" class="button ghost" data-action="apply-cancel">Cancel</button>
        <button type="button" class="button primary" data-action="apply-confirm" disabled>Apply</button>
      </footer>
    </dialog>

    <dialog class="modal create-skill-modal" data-modal="create-skill" aria-labelledby="create-skill-title">
      <header class="modal-header">
        <h2 id="create-skill-title">New skill</h2>
        <button type="button" class="modal-close" id="closeCreateSkillButton" aria-label="Close">&times;</button>
      </header>
      <div class="modal-body create-skill-modal-body">
        <div id="createSkillEditorRoot"></div>
      </div>
    </dialog>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
